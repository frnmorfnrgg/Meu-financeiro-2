<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINANCEIRO PRO | HUB MASTER v9.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --card: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- HEADER LUXURY --- */
        header {
            height: 95px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .stats-hub { display: flex; gap: 20px; }
        .stat-premium {
            background: var(--glass); border: 1px solid var(--border); padding: 12px 25px;
            border-radius: 16px; min-width: 190px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .stat-premium::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .stat-premium:hover::after { left: 100%; }
        .stat-premium:hover { border-color: var(--primary); transform: translateY(-3px); }

        .label { font-size: 9px; color: #777; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 4px; display: block; }
        .value { font-size: 20px; font-weight: 800; }
        .p-color { color: var(--primary); text-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .s-color { color: var(--secondary); }

        /* --- NAVEGAÇÃO MODERNA --- */
        .nav-tabs {
            background: #121212; padding: 6px; border-radius: 14px; display: flex; gap: 8px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            padding: 12px 24px; border: none; background: transparent; color: #555;
            font-size: 11px; font-weight: 800; cursor: pointer; border-radius: 10px;
            text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .tab-btn i { font-size: 14px; }
        .tab-btn.active { background: var(--primary); color: #000; box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2); }

        /* --- BOTÃO DE AÇÃO --- */
        .btn-sync {
            background: #fff; color: #000; border: none; padding: 14px 25px; border-radius: 12px;
            font-weight: 800; font-size: 11px; text-transform: uppercase; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-sync:hover { background: var(--primary); transform: scale(1.05); }

        /* --- VIEWPORT (CONTEÚDO) --- */
        main { flex: 1; padding: 20px; position: relative; }
        .page-container {
            width: 100%; height: 100%; border-radius: 24px; overflow: hidden;
            border: 1px solid var(--border); box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            display: none; background: #000;
        }
        .page-container.active { display: block; animation: slideUp 0.6s ease-out; }
        iframe { width: 100%; height: 100%; border: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* NOTIFICAÇÃO FLOATING */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #fff; color: #000; padding: 15px 40px; border-radius: 50px;
            font-size: 12px; font-weight: 800; transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 10000; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast"><i class="fas fa-check-circle"></i> SALDOS SINCRONIZADOS COM SUCESSO</div>

    <header>
        <div class="stats-hub">
            <div class="stat-premium">
                <span class="label">Saldo Histórico IA</span>
                <span id="topo-lucro" class="value p-color">R$ 0,00</span>
            </div>
            <div class="stat-premium">
                <span class="label">Investimento IA</span>
                <span id="topo-inv" class="value s-color">R$ 0,00</span>
            </div>
        </div>

        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchPage('ia', this)">
                <i class="fas fa-robot"></i> Scanner Cavalo
            </button>
            <button class="tab-btn" onclick="switchPage('fin', this)">
                <i class="fas fa-wallet"></i> Financeiro 4
            </button>
        </nav>

        <button class="btn-sync" onclick="startSync()">
            <i class="fas fa-sync-alt"></i> Atualizar Saldo
        </button>
    </header>

    <main>
        <div id="page-ia" class="page-container active">
            <iframe id="iframe-ia" src="https://frnmorfnrgg.github.io/Cavalo/"></iframe>
        </div>

        <div id="page-fin" class="page-container">
            <iframe id="iframe-fin" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
        </div>
    </main>

    <script>
        // Função para trocar de abas
        function switchPage(pageId, btn) {
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('page-' + pageId).classList.add('active');
            btn.classList.add('active');
        }

        // Função Master de Sincronização
        function startSync() {
            const frameIA = document.getElementById('iframe-ia').contentWindow;
            // Envia comando para a IA realizar a leitura dos cartões de registro
            frameIA.postMessage({ type: 'requestFullHistory' }, '*');
        }

        // Ouvinte de Mensagens (Recebe os dados da IA e espalha pelo site)
        window.addEventListener('message', (e) => {
            // Verifica se a mensagem veio da IA com os dados de lucro e investimento
            if (e.data.type === 'sync_history' || e.data.type === 'lancar' || e.data.type === 'update_hub_saldo') {
                
                const lucro = parseFloat(e.data.lucroTotal || e.data.valor || 0);
                const inv = parseFloat(e.data.invTotal || 0);

                // Formata os números para Real (R$)
                const formatar = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                // 1. Atualiza os saldos do Topo Único
                document.getElementById('topo-lucro').innerText = formatar(lucro);
                document.getElementById('topo-inv').innerText = formatar(inv);

                // 2. Salva no cache do navegador (Persistência)
                localStorage.setItem('hub_lucro_master', lucro);
                localStorage.setItem('hub_inv_master', inv);

                // 3. Injeta o valor no "Saldo Disponível" dentro da aba Financeiro
                document.getElementById('iframe-fin').contentWindow.postMessage({
                    type: 'forceUpdateFinance',
                    lucro: lucro,
                    investido: inv
                }, '*');

                // 4. Mostra a notificação bonita
                showNotification();
            }
        });

        function showNotification() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Carrega os dados salvos assim que o site abre
        window.onload = () => {
            const l = parseFloat(localStorage.getItem('hub_lucro_master') || 0);
            const i = parseFloat(localStorage.getItem('hub_inv_master') || 0);
            const formatar = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            document.getElementById('topo-lucro').innerText = formatar(l);
            document.getElementById('topo-inv').innerText = formatar(i);
        };
    </script>
</body>
</html>
