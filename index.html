    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO ™ Hub</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; 
            --red: #ff3e3e; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }
        
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; font-size: 16px; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--neon); color: #000; font-weight: bold; cursor: pointer; }

        header {
            padding: 15px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .nav-tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #111; color: #888; font-weight: bold; cursor: pointer; font-size: 11px; }
        .tab-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,136,0.05); }

        .container { padding: 15px; max-width: 500px; margin: auto; width: 100%; }
        .view { display: none; }
        .view.active { display: block; }

        .wallet-card { background: linear-gradient(135deg, #111 0%, #050505 100%); padding: 20px; border-radius: 15px; border: 1px solid var(--neon); text-align: center; margin-bottom: 15px; position: relative; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; font-weight: bold; }
        
        .btn-zerar {
            background: rgba(255, 62, 62, 0.1); color: var(--red); border: 1px solid var(--red);
            padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: bold;
            margin-top: 10px; cursor: pointer;
        }

        .btn-logout { position: absolute; top: 10px; right: 15px; background: none; border: none; color: #444; font-size: 16px; cursor: pointer; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .manual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-box { background: #1a1a1a; padding: 10px; border-radius: 12px; border: 1px solid #333; position: relative; }
        .input-box label { display: block; font-size: 9px; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; outline: none; font-size: 14px; }
        
        .calendar-box { display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--blue); }
        .calendar-box.selected { border-color: var(--blue); background: rgba(0, 212, 255, 0.05); }

        .scanner-btn { background: #121212; border: 2px dashed #333; border-radius: 20px; padding: 30px 10px; text-align: center; cursor: pointer; margin-bottom: 15px; }
        .loading-box { display: none; margin-top: 15px; color: var(--blue); font-weight: bold; font-size: 0.8rem; }
        .btn-lancar { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-bottom: 15px; display: none; }

        .hist-item { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #333; position: relative; border-left: 5px solid #ffaa00; }
        .btn-del { position: absolute; right: 10px; top: 10px; color: var(--red); background: none; border: none; font-size: 20px; cursor: pointer; }
        .btn-check { width: 100%; margin-top: 10px; padding: 10px; border-radius: 8px; border: 1px solid var(--neon); background: transparent; color: var(--neon); font-weight: bold; cursor: pointer; }
        
        .date-badge { display: inline-block; background: rgba(0, 212, 255, 0.1); color: var(--blue); padding: 4px 8px; border-radius: 6px; font-size: 11px; margin-top: 8px; font-weight: bold; border: 1px solid rgba(0, 212, 255, 0.2); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--neon); margin-bottom: 20px;">Finance PRO</h1>
        <input type="text" id="userField" placeholder="Seu ID">
        <input type="password" id="passField" placeholder="Senha">
        <button class="btn-auth" onclick="handleLogin()">ENTRAR</button>
    </div>
</div>

<header id="main-header" style="display:none">
    <div class="wallet-card">
        <button class="btn-logout" onclick="mudarConta()"><i class="fas fa-user-friends"></i></button>
        
        <span class="stat-label" style="color: var(--neon)">Saldo Coletado</span>
        <div id="label-carteira" style="font-size: 24px; font-weight: 900; color: #fff; margin: 5px 0;">R$ 0,00</div>
        <button class="btn-zerar" onclick="zerarSaldoColetado()">ZERAR SALDO COLETADO</button>

        <div style="display:flex; gap:10px; justify-content:center; margin-top:15px">
            <div class="stat-label">Investido: <span id="label-inv" style="color:var(--blue)">R$ 0,00</span></div>
            <div class="stat-label">Pendente: <span id="label-lucro" style="color:#ffaa00">R$ 0,00</span></div>
        </div>
    </div>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('financeiro')"><i class="fas fa-wallet"></i> FINANCEIRO</button>
        <button class="tab-btn" onclick="switchTab('scanner')"><i class="fas fa-robot"></i> ESCANEAR IA</button>
    </div>
</header>

<div class="container" id="app-content" style="display:none">
    <div id="view-financeiro" class="view active">
        <div class="card">
            <div class="manual-grid">
                <div class="input-box"><label>Valor (R$)</label><input type="number" id="inp-p" placeholder="0.00"></div>
                <div class="input-box"><label>Taxa (%)</label><input type="number" id="inp-i" placeholder="0"></div>
                <div class="input-box"><label>Dias</label><input type="number" id="inp-n" value="1"></div>
                
                <div class="input-box calendar-box" id="cal-box" onclick="document.getElementById('hidden-date').showPicker()">
                    <label style="position:absolute; top:10px; left:10px;">Data Início</label>
                    <i class="fas fa-calendar-day" style="margin-top:12px; font-size: 18px;"></i>
                    <span id="display-data" style="font-size: 10px; margin-left: 5px; margin-top: 12px; font-weight: bold;">HOJE</span>
                    <input type="date" id="hidden-date" style="position:absolute; opacity:0; pointer-events:none;" onchange="definirDataInicio(this.value)">
                </div>
            </div>
            <button class="btn-save" onclick="adicionarManual()" style="width:100%; padding:15px; border-radius:12px; background:var(--neon); border:none; font-weight:bold; color:#000;">LANÇAR INVESTIMENTO</button>
        </div>
        <div id="lista-financeiro"></div>
    </div>

    <div id="view-scanner" class="view">
        <div class="scanner-btn" onclick="document.getElementById('file-input').click()">
            <span style="font-size: 2rem;">📸</span><br>
            <b style="color: var(--blue);">ESCANEAR COMPROVANTE</b>
            <input type="file" id="file-input" accept="image/*" hidden onchange="processarIA(this)">
            <div id="loading" class="loading-box">🤖 IA ANALISANDO...</div>
        </div>
        <button id="btn-lancar-ia" class="btn-lancar" onclick="lancarEscaneados()">🚀 LANÇAR TUDO NO FINANCEIRO</button>
        <div id="lista-ia"></div>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO ---
    const GEMINI_API_KEY = "AIzaSyBy6sT6PE2qWF2rP4Ol8bzsxmPetv66VRM"; 
    
    let dataInicioManual = "";
    let currentUser = "";
    let dadosFinanceiros = [];
    let dadosEscaneados = [];
    let saldoCofre = 0;

    // --- FUNÇÕES DE UTILIDADE ---
    function definirDataInicio(val) {
        if(!val) return;
        const partes = val.split('-');
        dataInicioManual = `${partes[2]}/${partes[1]}/${partes[0]}`;
        document.getElementById('display-data').innerText = dataInicioManual;
        document.getElementById('cal-box').classList.add('selected');
    }

    function formatarDataRecebimento(dataStr, dias) {
        try {
            let partes = dataStr.split('/');
            let data = new Date(partes[2], partes[1] - 1, partes[0]);
            data.setDate(data.getDate() + parseInt(dias));
            const diasSemana = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
            return `${diasSemana[data.getDay()]}, ${data.getDate().toString().padStart(2, '0')}/${(data.getMonth() + 1).toString().padStart(2, '0')}`;
        } catch(e) { return "Erro data"; }
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // --- PROCESSAMENTO COM IA (VERSÃO ATUALIZADA V1) ---
    async function processarIA(input) {
        if (!input.files[0]) return;
        const loading = document.getElementById('loading');
        loading.style.display = 'block';

        try {
            const file = input.files[0];
            const base64Data = await toBase64(file);
            const pureBase64 = base64Data.split(',')[1];

            // Mudança para endpoint v1 estável
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Extraia deste comprovante financeiro em JSON puro: valor (número), taxa (número), dias (número), data (DD/MM/AAAA). Se não encontrar algo use 0 ou data de hoje." },
                            { inline_data: { mime_type: file.type, data: pureBase64 } }
                        ]
                    }]
                })
            });

            const resData = await response.json();
            if (resData.error) throw new Error(resData.error.message);

            const textResponse = resData.candidates[0].content.parts[0].text;
            const jsonMatch = textResponse.match(/\{.*\}/s);
            if (!jsonMatch) throw new Error("A IA não conseguiu formatar os dados.");
            
            const extraido = JSON.parse(jsonMatch[0]);

            dadosEscaneados.unshift({
                id: Date.now(),
                data: extraido.data || new Date().toLocaleDateString('pt-BR'),
                investido: parseFloat(extraido.valor) || 0,
                lucro: (parseFloat(extraido.valor) * (parseFloat(extraido.taxa) / 100) * parseInt(extraido.dias || 1)),
                prazo: parseInt(extraido.dias) || 1
            });

            renderScanner();
            Swal.fire("Sucesso!", "Comprovante processado.", "success");

        } catch (e) { 
            console.error(e);
            Swal.fire("Erro na IA", "Detalhe: " + e.message, "error"); 
        } finally { 
            loading.style.display = 'none'; 
            input.value = ""; 
        }
    }

    // --- LÓGICA DE NEGÓCIO ---
    function adicionarManual() {
        const p = parseFloat(document.getElementById('inp-p').value) || 0;
        const i = parseFloat(document.getElementById('inp-i').value) || 0;
        const n = parseInt(document.getElementById('inp-n').value) || 1;
        if(p <= 0) return;

        const dataUsar = dataInicioManual || new Date().toLocaleDateString('pt-BR');
        dadosFinanceiros.unshift({ id: Date.now(), valor: p, lucro: p * (i/100) * n, data: dataUsar, prazo: n, recebido: false });
        
        salvar();
        document.getElementById('inp-p').value = ""; document.getElementById('inp-i').value = ""; document.getElementById('inp-n').value = "1";
        document.getElementById('display-data').innerText = "HOJE"; dataInicioManual = "";
        document.getElementById('cal-box').classList.remove('selected');
    }

    function handleLogin() {
        const u = document.getElementById('userField').value.trim().toLowerCase();
        if(!u) return;
        currentUser = u;
        localStorage.setItem('finance_session', u);
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'block';
        document.getElementById('app-content').style.display = 'block';
        carregarTudo();
    }

    function mudarConta() { localStorage.removeItem('finance_session'); location.reload(); }
    function zerarSaldoColetado() { Swal.fire({ title: 'Zerar?', icon: 'warning', showCancelButton: true }).then(r => { if(r.isConfirmed){ saldoCofre = 0; salvar(); }}); }

    function switchTab(tab) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    function renderScanner() {
        document.getElementById('btn-lancar-ia').style.display = dadosEscaneados.length > 0 ? 'block' : 'none';
        document.getElementById('lista-ia').innerHTML = dadosEscaneados.map(item => `
            <div class="card" style="border-left:4px solid var(--blue)">
                <button class="btn-del" onclick="removerScan(${item.id})">&times;</button>
                <small>${item.data}</small><br>
                <b>R$ ${item.investido.toFixed(2)}</b> -> <b style="color:var(--neon)">Lucro R$ ${item.lucro.toFixed(2)}</b>
            </div>`).join('');
    }

    function renderFinanceiro() {
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        let pLucro = 0, pInv = 0;
        document.getElementById('lista-financeiro').innerHTML = dadosFinanceiros.map(item => {
            if(!item.recebido) { pLucro += item.lucro; pInv += item.valor; }
            return `
                <div class="hist-item" style="border-left-color: ${item.recebido ? 'var(--neon)' : '#ffaa00'}">
                    <button class="btn-del" onclick="remover(${item.id})">&times;</button>
                    <small>${item.data} (${item.prazo} dias)</small><br>
                    <b>Aporte: ${f(item.valor)}</b> | <b style="color:var(--neon)">+ ${f(item.lucro)}</b><br>
                    ${!item.recebido ? `
                        <div class="date-badge">Receber: ${formatarDataRecebimento(item.data, item.prazo)}</div>
                        <button class="btn-check" onclick="marcarRecebido(${item.id})">COLETAR LUCRO</button>
                    ` : '<div class="date-badge" style="color:var(--neon)">CONCLUÍDO</div>'}
                </div>`;
        }).join('');
        document.getElementById('label-carteira').innerText = f(saldoCofre);
        document.getElementById('label-lucro').innerText = f(pLucro);
        document.getElementById('label-inv').innerText = f(pInv);
    }

    function salvar() {
        localStorage.setItem(currentUser + '_dados', JSON.stringify(dadosFinanceiros));
        localStorage.setItem(currentUser + '_cofre', saldoCofre);
        renderFinanceiro();
    }

    function carregarTudo() {
        dadosFinanceiros = JSON.parse(localStorage.getItem(currentUser + '_dados')) || [];
        saldoCofre = parseFloat(localStorage.getItem(currentUser + '_cofre')) || 0;
        renderFinanceiro();
    }

    function marcarRecebido(id) {
        const item = dadosFinanceiros.find(d => d.id === id);
        if(item && !item.recebido) { item.recebido = true; saldoCofre += item.lucro; salvar(); }
    }

    function remover(id) { dadosFinanceiros = dadosFinanceiros.filter(d => d.id !== id); salvar(); }
    function removerScan(id) { dadosEscaneados = dadosEscaneados.filter(i => i.id !== id); renderScanner(); }
    function lancarEscaneados() {
        dadosEscaneados.forEach(i => dadosFinanceiros.unshift({ ...i, valor: i.investido, recebido: false }));
        dadosEscaneados = []; salvar(); renderScanner(); switchTab('financeiro');
    }

    window.onload = () => {
        const s = localStorage.getItem('finance_session');
        if(s) { document.getElementById('userField').value = s; handleLogin(); }
    };
</script>
</body>
</html>
