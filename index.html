<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINANCEIRO PRO | MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --primary: #00ff88; --bg: #050505; --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header {
            height: 90px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; min-width: 150px; }
        .label { font-size: 8px; color: #777; text-transform: uppercase; font-weight: 700; }
        .value { font-size: 18px; font-weight: 800; color: var(--primary); display: block; }

        .tabs { background: #111; padding: 5px; border-radius: 10px; display: flex; gap: 5px; border: 1px solid var(--border); }
        .tab-btn { padding: 8px 15px; border: none; background: transparent; color: #555; font-size: 10px; font-weight: 800; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: var(--primary); color: #000; }

        main { flex: 1; padding: 10px; }
        .viewport { width: 100%; height: 100%; border-radius: 15px; overflow: hidden; display: none; border: 1px solid var(--border); }
        .viewport.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-update { background: #fff; color: #000; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 800; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; gap: 10px;">
            <div class="stat-card">
                <span class="label">Saldo Histórico IA</span>
                <span id="topo-lucro" class="value">R$ 0,00</span>
            </div>
            <div class="stat-card">
                <span class="label">Investimento IA</span>
                <span id="topo-inv" class="value" style="color: #00d4ff;">R$ 0,00</span>
            </div>
        </div>

        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('ia', this)">Scanner IA</button>
            <button class="tab-btn" onclick="switchTab('fin', this)">Financeiro</button>
        </nav>

        <button class="btn-update" onclick="forceSync()">
            <i class="fas fa-sync"></i> ATUALIZAR
        </button>
    </header>

    <main>
        <div id="page-ia" class="viewport active">
            <iframe id="frame-ia" src="https://frnmorfnrgg.github.io/Meu-financeiro-2/"></iframe>
        </div>
        <div id="page-fin" class="viewport">
            <iframe id="frame-fin" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
        </div>
    </main>

    <script>
        function switchTab(id, btn) {
            document.querySelectorAll('.viewport').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            btn.classList.add('active');
        }

        // 1. SOLICITA OS DADOS DO HISTÓRICO
        function forceSync() {
            const frameIA = document.getElementById('frame-ia').contentWindow;
            frameIA.postMessage({ type: 'requestFullHistory' }, '*');
        }

        // 2. RECEBE E ATUALIZA
        window.addEventListener('message', (e) => {
            if (e.data.type === 'sync_history' || e.data.type === 'lancar' || e.data.lucroTotal !== undefined) {
                const lucro = parseFloat(e.data.lucroTotal || 0);
                const inv = parseFloat(e.data.invTotal || 0);
                
                const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                // Atualiza o visual
                document.getElementById('topo-lucro').innerText = f(lucro);
                document.getElementById('topo-inv').innerText = f(inv);

                // Salva para não perder ao dar F5
                localStorage.setItem('hub_l', lucro);
                localStorage.setItem('hub_i', inv);

                // Dispara a mensagem bonita
                if(lucro > 0) {
                    Swal.fire({
                        title: 'Saldos Sincronizados!',
                        html: `<div style="text-align: left;">
                                <p style="color:#00ff88">Investido: <span style="float:right;color:#fff">${f(inv)}</span></p>
                                <p style="color:#00d4ff">Lucro: <span style="float:right;color:#fff">${f(lucro)}</span></p>
                               </div>`,
                        icon: 'success',
                        background: '#111',
                        color: '#fff',
                        confirmButtonColor: '#00ff88'
                    });
                }
            }
        });

        window.onload = () => {
            const l = parseFloat(localStorage.getItem('hub_l') || 0);
            const i = parseFloat(localStorage.getItem('hub_i') || 0);
            const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('topo-lucro').innerText = f(l);
            document.getElementById('topo-inv').innerText = f(i);
        };
    </script>
</body>
</html>
