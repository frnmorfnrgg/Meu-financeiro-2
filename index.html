<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema Unificado IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; background: #000; overflow: hidden; color: white; }

        /* Cabeçalho */
        .header {
            height: 65px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 2px solid #007bff;
            z-index: 1000;
            position: relative;
        }

        .title-area { flex-grow: 1; }
        .title-area h1 { font-size: 14px; color: #007bff; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Saldo Total no Topo */
        .total-box {
            background: #222;
            padding: 5px 12px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: right;
            margin-right: 15px;
        }
        .total-label { font-size: 9px; color: #888; display: block; }
        .total-value { font-size: 16px; font-weight: bold; color: #28a745; }

        /* Menu Burguer */
        .menu-btn { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .menu-btn span { display: block; height: 3px; width: 100%; background: #fff; border-radius: 2px; transition: 0.3s; }

        /* Menu Lateral */
        .sidebar {
            position: fixed;
            top: 0; right: -280px;
            width: 280px; height: 100%;
            background: #111;
            z-index: 9999;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 80px;
            box-shadow: -10px 0 20px rgba(0,0,0,0.8);
        }
        .sidebar.open { right: 0; }
        .nav-item {
            display: block;
            padding: 20px 25px;
            color: #ddd;
            text-decoration: none;
            font-size: 17px;
            border-bottom: 1px solid #222;
        }
        .nav-item:active { background: #007bff; color: white; }

        /* Area dos Sites */
        .main-content { width: 100%; height: calc(100% - 65px); }
        .page { width: 100%; height: 100%; display: none; }
        .page.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9998;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <header class="header">
        <div class="title-area">
            <h1 id="current-page-name">Meu Financeiro</h1>
        </div>
        
        <div class="total-box">
            <span class="total-label">SALDO TOTAL</span>
            <span class="total-value" id="global-balance">R$ 0,00</span>
        </div>

        <div class="menu-btn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <a href="#" class="nav-item" onclick="changePage('fin', 'Meu Financeiro')">💰 Meu Financeiro</a>
        <a href="#" class="nav-item" onclick="changePage('ia', 'Project Escaneamento com IA')">🔍 Escaneamento com IA</a>
    </nav>

    <main class="main-content">
        <div id="page-fin" class="page active">
            <iframe id="iframe-fin" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
        </div>
        <div id="page-ia" class="page">
            <iframe id="iframe-ia" src="https://frnmorfnrgg.github.io/Cavalo/"></iframe>
        </div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function changePage(pageId, name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('current-page-name').innerText = name;
            toggleMenu();
        }

        // ROBÔ DE CAPTURA DE SALDO
        // Ele "vigia" o site de IA e puxa o valor que aparecer na tela
        window.addEventListener('message', function(event) {
            if (event.data.type === 'updateBalance') {
                const valor = parseFloat(event.data.value) || 0;
                document.getElementById('global-balance').innerText = 'R$ ' + valor.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            }
        });

        // Tenta detectar o saldo automaticamente via leitura de tela do Iframe
        setInterval(() => {
            const iframeIA = document.getElementById('iframe-ia');
            // Nota: Devido a segurança, o navegador pode bloquear leitura direta, 
            // por isso o postMessage (enviado do outro site) é o método oficial.
        }, 3000);
    </script>
</body>
</html>
