<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro + IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; }

        /* Cabeçalho do App */
        .header {
            height: 75px; background: #111; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 2px solid #007bff; justify-content: space-between;
        }

        .stats { display: flex; gap: 8px; }
        .stat-box { background: #222; padding: 6px 12px; border-radius: 8px; border: 1px solid #333; min-width: 100px; }
        .stat-label { font-size: 10px; color: #888; display: block; text-transform: uppercase; margin-bottom: 2px; }
        .stat-val { font-size: 14px; font-weight: bold; }
        .val-lucro { color: #28a745; } /* Verde para Lucro */
        .val-inv { color: #ffc107; }   /* Amarelo para Investimento */

        /* Ícone do Menu Superior Direito */
        .menu-btn { width: 30px; height: 22px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .menu-btn span { height: 3px; background: #fff; border-radius: 2px; }

        /* Menu Lateral */
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 260px; height: 100%;
            background: #111; z-index: 1000; transition: 0.3s; padding-top: 80px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar.open { right: 0; }
        .nav-link { display: block; padding: 20px 25px; color: #fff; text-decoration: none; border-bottom: 1px solid #222; font-size: 16px; }

        /* Área de Exibição dos Sites */
        .content { height: calc(100vh - 75px); display: none; }
        .content.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <header class="header">
        <div class="stats">
            <div class="stat-box">
                <span class="stat-label">Lucro Total</span>
                <span id="saldo-lucro" class="stat-val val-lucro">R$ 0,00</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Investido IA</span>
                <span id="saldo-inv" class="stat-val val-inv">R$ 0,00</span>
            </div>
        </div>
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <nav id="sidebar" class="sidebar">
        <a href="#" class="nav-link" onclick="showPage('fin')">💰 Meu Financeiro</a>
        <a href="#" class="nav-link" onclick="showPage('ia')">🔍 Project Escaneamento IA</a>
    </nav>

    <div id="page-fin" class="content active">
        <iframe src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
    </div>

    <div id="page-ia" class="content">
        <iframe id="iframe-ia" src="https://frnmorfnrgg.github.io/Cavalo/"></iframe>
    </div>

    <script>
        let lucroTotal = 0;
        let investimentoTotal = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
        
        function showPage(p) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            toggleMenu();
        }

        // LÓGICA DE INTEGRAÇÃO (Recebe os dados do site de IA)
        window.addEventListener('message', function(e) {
            if (e.data.type === 'lancar') {
                // Adiciona os valores recebidos aos totais
                lucroTotal += parseFloat(e.data.lucro || 0);
                investimentoTotal += parseFloat(e.data.investido || 0);
                
                // Atualiza os valores na tela do topo
                document.getElementById('saldo-lucro').innerText = 'R$ ' + lucroTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                document.getElementById('saldo-inv').innerText = 'R$ ' + investimentoTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            }
        });
    </script>
</body>
</html>
