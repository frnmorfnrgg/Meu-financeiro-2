<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINANCEIRO PRO | EXCLUSIVE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER ÚNICO (CORRIGE DUPLICAÇÃO) */
        header {
            height: 90px; padding: 0 25px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .stats-container { display: flex; gap: 15px; }
        .stat-card {
            background: var(--glass); border: 1px solid var(--border); padding: 10px 20px;
            border-radius: 14px; min-width: 160px; transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .label { font-size: 8px; color: #777; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        .value { font-size: 18px; font-weight: 800; display: block; }
        .p-color { color: var(--primary); }

        /* NAVEGAÇÃO POR ABAS */
        .nav-tabs {
            background: #111; padding: 5px; border-radius: 12px; display: flex; gap: 5px; border: 1px solid var(--border);
        }
        .tab-btn {
            padding: 10px 18px; border: none; background: transparent; color: #555;
            font-size: 10px; font-weight: 800; cursor: pointer; border-radius: 8px;
            text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .tab-btn.active { background: var(--primary); color: #000; box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3); }

        /* CONTEÚDO (IFRAMES) */
        main { flex: 1; padding: 15px; position: relative; }
        .viewport {
            width: 100%; height: 100%; border-radius: 20px; overflow: hidden;
            border: 1px solid var(--border); display: none; background: #000;
        }
        .viewport.active { display: block; animation: fadeIn 0.5s ease; }
        iframe { width: 100%; height: 100%; border: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* BOTÃO ATUALIZAR */
        .btn-sync {
            background: #fff; color: #000; border: none; padding: 12px 20px; border-radius: 10px;
            font-weight: 800; font-size: 10px; cursor: pointer; text-transform: uppercase;
        }

        /* ESTILO DA MENSAGEM BONITA (SweetAlert Custom) */
        .swal2-popup { border-radius: 20px !important; border: 1px solid var(--primary) !important; font-family: 'Plus Jakarta Sans', sans-serif !important; }
    </style>
</head>
<body>

    <header>
        <div class="stats-container">
            <div class="stat-card">
                <span class="label">Saldo Histórico IA</span>
                <span id="txt-lucro" class="value p-color">R$ 0,00</span>
            </div>
            <div class="stat-card">
                <span class="label">Investimento Total</span>
                <span id="txt-inv" class="value" style="color:var(--secondary)">R$ 0,00</span>
            </div>
        </div>

        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchPage('ia', this)">
                <i class="fas fa-robot"></i> Scanner Cavalo
            </button>
            <button class="tab-btn" onclick="switchPage('fin', this)">
                <i class="fas fa-wallet"></i> Financeiro 4
            </button>
        </nav>

        <button class="btn-sync" onclick="syncAll()">
            <i class="fas fa-sync"></i> Atualizar
        </button>
    </header>

    <main>
        <div id="page-ia" class="viewport active">
            <iframe id="frame-ia" src="https://frnmorfnrgg.github.io/Cavalo/"></iframe>
        </div>
        <div id="page-fin" class="viewport">
            <iframe id="frame-fin" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
        </div>
    </main>

    <script>
        function switchPage(id, btn) {
            document.querySelectorAll('.viewport').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            btn.classList.add('active');
        }

        // DISPARA A SINCRONIZAÇÃO E MOSTRA A MENSAGEM BONITA
        function syncAll() {
            const frameIA = document.getElementById('frame-ia').contentWindow;
            frameIA.postMessage({ type: 'requestFullHistory' }, '*');
        }

        window.addEventListener('message', (e) => {
            if (e.data.type === 'sync_history' || e.data.type === 'lancar') {
                const lucro = e.data.lucroTotal || 0;
                const inv = e.data.invTotal || 0;
                const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                // Atualiza Topo
                document.getElementById('txt-lucro').innerText = f(lucro);
                document.getElementById('txt-inv').innerText = f(inv);

                // Salva Local
                localStorage.setItem('master_lucro', lucro);
                localStorage.setItem('master_inv', inv);

                // MENSAGEM BONITA (SUBSTITUI O ALERT CINZA)
                Swal.fire({
                    title: 'Lançamento Concluído!',
                    html: `
                        <div style="text-align: left; padding: 10px;">
                            <p style="color: #00ff88; font-weight: 800; margin-bottom: 5px;">
                                Investido: <span style="float: right; color: #fff;">${f(inv)}</span>
                            </p>
                            <p style="color: #00d4ff; font-weight: 800;">
                                Lucro: <span style="float: right; color: #fff;">${f(lucro)}</span>
                            </p>
                        </div>
                    `,
                    icon: 'success',
                    iconColor: '#00ff88',
                    background: '#0a0a0a',
                    color: '#fff',
                    confirmButtonColor: '#00ff88',
                    confirmButtonText: 'EXCELENTE',
                    backdrop: `rgba(0,0,0,0.8) blur(8px)`
                });

                // Atualiza o Financeiro 4 internamente
                document.getElementById('frame-fin').contentWindow.postMessage({
                    type: 'forceUpdateFinance',
                    lucro: lucro,
                    investido: inv
                }, '*');
            }
        });

        window.onload = () => {
            const l = parseFloat(localStorage.getItem('master_lucro') || 0);
            const i = parseFloat(localStorage.getItem('master_inv') || 0);
            const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('txt-lucro').innerText = f(l);
            document.getElementById('txt-inv').innerText = f(i);
        };
    </script>
</body>
</html>
