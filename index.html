<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro + IA Unificado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: white; overflow: hidden; height: 100vh; }

        /* Cabeçalho */
        .header {
            height: 80px; background: #111; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 2px solid #007bff; justify-content: space-between;
        }

        .stats { display: flex; gap: 8px; flex-grow: 1; }
        .stat-box { background: #222; padding: 6px 10px; border-radius: 8px; border: 1px solid #333; flex: 1; }
        .stat-label { font-size: 9px; color: #888; display: block; text-transform: uppercase; }
        .stat-val { font-size: 13px; font-weight: bold; }
        .val-lucro { color: #00ff88; }
        .val-inv { color: #ffc107; }

        /* Menu Icon */
        .menu-btn { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; margin-left: 10px; }
        .menu-btn span { height: 3px; background: #fff; border-radius: 2px; }

        /* Menu Lateral */
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 260px; height: 100%;
            background: #111; z-index: 1000; transition: 0.3s; padding-top: 60px;
        }
        .sidebar.open { right: 0; }
        .nav-link { display: block; padding: 20px; color: #fff; text-decoration: none; border-bottom: 1px solid #222; }

        /* Botão de Lançar (Sempre visível no topo quando na IA) */
        #btn-lancar-hub {
            display: none; background: #28a745; color: white; border: none;
            padding: 10px; border-radius: 5px; font-weight: bold; font-size: 11px;
            margin-right: 10px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .content { height: calc(100vh - 80px); display: none; }
        .content.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <header class="header">
        <div class="stats">
            <div class="stat-box">
                <span class="stat-label">Lucro Total</span>
                <span id="saldo-lucro" class="stat-val val-lucro">R$ 0,00</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Investido IA</span>
                <span id="saldo-inv" class="stat-val val-inv">R$ 0,00</span>
            </div>
        </div>
        
        <button id="btn-lancar-hub" onclick="solicitarLancamento()">🚀 LANÇAR</button>

        <div class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </header>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <nav id="sidebar" class="sidebar">
        <a href="#" class="nav-link" onclick="showPage('fin')">💰 Meu Financeiro</a>
        <a href="#" class="nav-link" onclick="showPage('ia')">🔍 Escaneamento com IA</a>
    </nav>

    <div id="page-fin" class="content active">
        <iframe id="frame-fin" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
    </div>

    <div id="page-ia" class="content">
        <iframe id="iframe-ia" src="https://frnmorfnrgg.github.io/Cavalo/"></iframe>
    </div>

    <script>
        let lucroTotal = 0;
        let invTotal = 0;

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
        
        function showPage(p) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            
            // Só mostra o botão de LANÇAR se estiver na página da IA
            document.getElementById('btn-lancar-hub').style.display = (p === 'ia') ? 'block' : 'none';
            toggleMenu();
        }

        // Função que pede pro site de IA enviar os dados
        function solicitarLancamento() {
            const frameIA = document.getElementById('iframe-ia').contentWindow;
            frameIA.postMessage({ type: 'requestData' }, '*');
        }

        // Escuta a resposta do site de IA
        window.addEventListener('message', function(e) {
            if (e.data.type === 'lancar') {
                lucroTotal += parseFloat(e.data.lucro || 0);
                invTotal += parseFloat(e.data.investido || 0);
                
                document.getElementById('saldo-lucro').innerText = 'R$ ' + lucroTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                document.getElementById('saldo-inv').innerText = 'R$ ' + invTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                alert("✅ Saldo sincronizado com sucesso!");
            }
        });
    </script>
</body>
</html>
