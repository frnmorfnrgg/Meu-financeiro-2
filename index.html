<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA FINANCEIRO PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --primary: #00ff88; --secondary: #00d4ff; --bg: #050505; --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- HEADER (Sem duplicação) --- */
        header {
            height: 90px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            z-index: 1000;
        }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; min-width: 155px; }
        .label { font-size: 8px; color: #777; text-transform: uppercase; font-weight: 700; }
        .value { font-size: 18px; font-weight: 800; color: var(--primary); display: block; }

        .tabs { background: #111; padding: 5px; border-radius: 10px; display: flex; gap: 5px; border: 1px solid var(--border); }
        .tab-btn { padding: 10px 18px; border: none; background: transparent; color: #555; font-size: 10px; font-weight: 800; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        .tab-btn.active { background: var(--primary); color: #000; }

        /* --- CONTEÚDO --- */
        main { flex: 1; padding: 10px; }
        .viewport { width: 100%; height: 100%; border-radius: 20px; overflow: hidden; display: none; border: 1px solid var(--border); background: #000; }
        .viewport.active { display: block; animation: fadeIn 0.4s ease; }
        iframe { width: 100%; height: 100%; border: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- CUSTOMIZAÇÃO DA MENSAGEM BONITA --- */
        .borda-neon { border: 1px solid var(--primary) !important; border-radius: 20px !important; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; gap: 12px;">
            <div class="stat-card">
                <span class="label">Saldo Histórico IA</span>
                <span id="topo-lucro" class="value">R$ 0,00</span>
            </div>
            <div class="stat-card">
                <span class="label">Investimento Total</span>
                <span id="topo-inv" class="value" style="color: var(--secondary);">R$ 0,00</span>
            </div>
        </div>

        <nav class="tabs">
            <button class="tab-btn active" onclick="switchPage('ia', this)">Scanner IA</button>
            <button class="tab-btn" onclick="switchPage('fin', this)">Financeiro</button>
        </nav>

        <button onclick="startSync()" style="background:#fff; border:none; padding:12px 20px; border-radius:10px; font-weight:800; font-size:10px; cursor:pointer;">
            <i class="fas fa-sync"></i> ATUALIZAR
        </button>
    </header>

    <main>
        <div id="page-ia" class="viewport active">
            <iframe id="frame-ia" src="https://frnmorfnrgg.github.io/Meu-financeiro-2/"></iframe>
        </div>
        <div id="page-fin" class="viewport">
            <iframe id="frame-fin" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
        </div>
    </main>

    <script>
        function switchPage(id, btn) {
            document.querySelectorAll('.viewport').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            btn.classList.add('active');
        }

        function startSync() {
            const frameIA = document.getElementById('frame-ia').contentWindow;
            frameIA.postMessage({ type: 'requestFullHistory' }, '*');
        }

        // --- RECEBENDO DADOS E MOSTRANDO A MENSAGEM ---
        window.addEventListener('message', (e) => {
            // Se a mensagem vier da IA com os valores reais
            if (e.data.type === 'sync_history' || e.data.type === 'lancar') {
                const lucro = e.data.lucroTotal || 0;
                const inv = e.data.invTotal || 0;
                const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                // 1. Atualiza os saldos no topo
                document.getElementById('topo-lucro').innerText = f(lucro);
                document.getElementById('topo-inv').innerText = f(inv);

                // 2. Salva os valores
                localStorage.setItem('val_l', lucro);
                localStorage.setItem('val_i', inv);

                // 3. Mostra a mensagem BONITA com os textos solicitados
                Swal.fire({
                    title: 'Lançamento Concluído!',
                    html: `
                        <div style="text-align: left; padding: 10px; font-weight: 800;">
                            <p style="color: #00ff88; margin-bottom: 8px;">
                                Seus investimentos: <span style="float: right; color: #fff;">${f(inv)}</span>
                            </p>
                            <p style="color: #00d4ff;">
                                Seu saldo: <span style="float: right; color: #fff;">${f(lucro)}</span>
                            </p>
                        </div>
                    `,
                    icon: 'success',
                    iconColor: '#00ff88',
                    background: '#0a0a0a',
                    color: '#fff',
                    confirmButtonColor: '#00ff88',
                    confirmButtonText: 'EXCELENTE',
                    backdrop: `rgba(0,0,0,0.8) blur(8px)`,
                    customClass: { popup: 'borda-neon' }
                });
            }
        });

        window.onload = () => {
            const l = parseFloat(localStorage.getItem('val_l') || 0);
            const i = parseFloat(localStorage.getItem('val_i') || 0);
            const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('topo-lucro').innerText = f(l);
            document.getElementById('topo-inv').innerText = f(i);
        };
    </script>
</body>
</html>
