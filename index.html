<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro Master - Único</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        /* Garante que o corpo não role, apenas o conteúdo interno */
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- TOPO ÚNICO --- */
        .header-unique {
            height: 85px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 2px solid var(--primary);
            justify-content: space-between;
            flex-shrink: 0; /* Impede o topo de sumir */
            z-index: 9999;
        }

        .stats-container { display: flex; gap: 12px; flex: 1; }
        
        .stat-box {
            background: var(--card);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #333;
            flex: 1;
        }

        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; display: block; }
        .stat-value { font-size: 16px; font-weight: bold; }
        .color-lucro { color: var(--primary); }
        .color-inv { color: #ffc107; }

        .btn-update {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 11px;
            cursor: pointer;
            margin-left: 15px;
            text-transform: uppercase;
        }

        /* --- ÁREA DO INVESTIMENTO IA --- */
        .viewport {
            flex: 1;
            width: 100%;
            background: #000;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <header class="header-unique">
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-label">Lucro Total</span>
                <span id="label-lucro" class="stat-value color-lucro">R$ 0,00</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Investido IA</span>
                <span id="label-inv" class="stat-value color-inv">R$ 0,00</span>
            </div>
        </div>
        <button class="btn-update" onclick="sincronizar()">🚀 Atualizar</button>
    </header>

    <main class="viewport">
        <iframe id="meu-iframe" src="https://frnmorfnrgg.github.io/Meu-financeiro-2/"></iframe>
    </main>

    <script>
        // Função para buscar os dados de investimento dentro do site
        function sincronizar() {
            const frame = document.getElementById('meu-iframe').contentWindow;
            // Envia comando para somar os cards de investimento
            frame.postMessage({ type: 'requestFullHistory' }, '*');
        }

        // Recebe os valores e limpa a duplicação visual
        window.addEventListener('message', (e) => {
            if (e.data.type === 'sync_history' || e.data.type === 'lancar') {
                const l = e.data.lucroTotal || 0;
                const i = e.data.invTotal || 0;

                // Atualiza o Topo Único
                document.getElementById('label-lucro').innerText = l.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                document.getElementById('label-inv').innerText = i.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                // Salva para não zerar ao recarregar
                localStorage.setItem('save_lucro', l);
                localStorage.setItem('save_inv', i);
            }
        });

        // Recupera os saldos ao abrir a página
        window.onload = () => {
            const sl = parseFloat(localStorage.getItem('save_lucro') || 0);
            const si = parseFloat(localStorage.getItem('save_inv') || 0);
            document.getElementById('label-lucro').innerText = sl.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('label-inv').innerText = si.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };
    </script>
</body>
</html>
