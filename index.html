<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO ™ Hub</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; 
            --red: #ff3e3e; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }
        
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; font-size: 16px; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--neon); color: #000; font-weight: bold; cursor: pointer; }

        header {
            padding: 15px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .nav-tabs { display: flex; gap: 5px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { flex: none; width: 110px; padding: 12px 5px; border-radius: 10px; border: 1px solid var(--border); background: #111; color: #888; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        .tab-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,136,0.05); }

        .container { padding: 15px; max-width: 500px; margin: auto; width: 100%; }
        .view { display: none; }
        .view.active { display: block; }

        .wallet-card { background: linear-gradient(135deg, #111 0%, #050505 100%); padding: 20px; border-radius: 15px; border: 1px solid var(--neon); text-align: center; margin-bottom: 15px; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; font-weight: bold; }
        
        .btn-zerar {
            background: rgba(255, 62, 62, 0.1); color: var(--red); border: 1px solid var(--red);
            padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: bold;
            margin-top: 10px; cursor: pointer;
        }

        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .input-box { background: #1a1a1a; padding: 10px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .input-box label { display: block; font-size: 9px; color: #888; margin-bottom: 4px; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; outline: none; }

        .hist-item { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #333; position: relative; border-left: 5px solid #ffaa00; }
        .btn-del { position: absolute; right: 10px; top: 10px; color: var(--red); background: none; border: none; font-size: 20px; cursor: pointer; }
        .btn-check { width: 100%; margin-top: 10px; padding: 10px; border-radius: 8px; border: 1px solid var(--neon); background: transparent; color: var(--neon); font-weight: bold; cursor: pointer; }
        
        .date-badge { display: inline-block; background: rgba(0, 212, 255, 0.1); color: var(--blue); padding: 4px 8px; border-radius: 6px; font-size: 11px; margin-top: 8px; font-weight: bold; border: 1px solid rgba(0, 212, 255, 0.2); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--neon); margin-bottom: 20px;">Finance PRO</h1>
        <input type="text" id="userField" placeholder="Seu ID">
        <input type="password" id="passField" placeholder="Senha">
        <button class="btn-auth" onclick="handleLogin()">ENTRAR</button>
    </div>
</div>

<header id="main-header" style="display:none">
    <div class="wallet-card">
        <span class="stat-label" style="color: var(--neon)">Saldo Coletado</span>
        <div id="label-carteira" style="font-size: 24px; font-weight: 900; color: #fff; margin: 5px 0;">R$ 0,00</div>
        <button class="btn-zerar" onclick="zerarSaldoColetado()">ZERAR SALDO COLETADO</button>

        <div style="display:flex; gap:10px; justify-content:center; margin-top:15px">
            <div class="stat-label">Investido: <span id="label-inv" style="color:var(--blue)">R$ 0,00</span></div>
            <div class="stat-label">Pendente: <span id="label-lucro" style="color:#ffaa00">R$ 0,00</span></div>
        </div>
    </div>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('financeiro')"><i class="fas fa-wallet"></i> OPERAÇÕES</button>
        <button class="tab-btn" onclick="switchTab('scanner')"><i class="fas fa-robot"></i> SCAN IA</button>
        <button class="tab-btn" onclick="switchTab('extrato')"><i class="fas fa-list-ul"></i> EXTRATO</button>
    </div>
</header>

<div class="container" id="app-content" style="display:none">
    <div id="view-financeiro" class="view active">
        <div class="card">
            <div class="input-box"><label>VALOR (R$)</label><input type="number" id="inp-p" placeholder="0.00"></div>
            <div class="input-box"><label>TAXA (%)</label><input type="number" id="inp-i" placeholder="0"></div>
            <div class="input-box"><label>DIAS</label><input type="number" id="inp-n" value="1"></div>
            <button onclick="adicionarManual()" style="width:100%; padding:15px; border-radius:12px; background:var(--neon); border:none; font-weight:bold; color:#000;">LANÇAR MANUAL</button>
        </div>
        <div id="lista-financeiro"></div>
    </div>

    <div id="view-scanner" class="view">
        <div class="card" style="border: 2px dashed #333; text-align:center; padding:40px 10px;" onclick="document.getElementById('file-input').click()">
            <span style="font-size: 2rem;">📸</span><br>
            <b style="color: var(--blue);">ESCANEAR COMPROVANTE</b>
            <input type="file" id="file-input" accept="image/*" hidden onchange="processarIA(this)">
            <div id="loading" style="display:none; margin-top:10px; color:var(--blue)">🤖 IA ANALISANDO...</div>
        </div>
        <button id="btn-lancar-ia" style="display:none; background:var(--neon); color:#000; border:none; padding:15px; width:100%; border-radius:12px; font-weight:bold; margin-top:15px;" onclick="lancarEscaneados()">🚀 LANÇAR TUDO NO FINANCEIRO</button>
        <div id="lista-ia"></div>
    </div>

    <div id="view-extrato" class="view">
        <h3 style="margin-bottom:15px; color:var(--neon); font-size:14px;">HISTÓRICO DE LUCROS COLETADOS</h3>
        <div id="lista-extrato"></div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('Erro SW', err));
        });
    }

    let currentUser = "";
    let dadosFinanceiros = [];
    let dadosEscaneados = [];
    let saldoCofre = 0;

    // --- OPÇÃO 3: LÓGICA DE NOTIFICAÇÃO ---
    async function solicitarPermissaoNotificacao() {
        if ('Notification' in window) {
            await Notification.requestPermission();
        }
    }

    function verificarVencimentosHoje() {
        const hoje = new Date().toLocaleDateString('pt-BR').split(',')[0];
        dadosFinanceiros.forEach(item => {
            const dataItemFormatada = formatarDataNotificacao(item.data, item.prazo);
            if (dataItemFormatada === hoje && !item.recebido) {
                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'NOTIFICAR_VENCIMENTO',
                        valor: item.lucro.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
                    });
                }
            }
        });
    }

    function formatarDataNotificacao(dataStr, dias) {
        let partes = dataStr.split('/');
        let data = new Date(partes[2], partes[1] - 1, partes[0]);
        data.setDate(data.getDate() + parseInt(dias));
        return data.toLocaleDateString('pt-BR');
    }

    // --- FUNÇÕES CORE ---
    function formatarDataRecebimento(dataStr, dias) {
        try {
            let partes = dataStr.split('/');
            let data = new Date(partes[2], partes[1] - 1, partes[0]);
            data.setDate(data.getDate() + parseInt(dias));
            const diasSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
            return `${diasSemana[data.getDay()]}, ${data.getDate().toString().padStart(2, '0')}/${(data.getMonth() + 1).toString().padStart(2, '0')}`;
        } catch(e) { return "Data inválida"; }
    }

    function handleLogin() {
        const u = document.getElementById('userField').value.trim().toLowerCase();
        if(!u) return;
        currentUser = u;
        localStorage.setItem('finance_session', u);
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'block';
        document.getElementById('app-content').style.display = 'block';
        solicitarPermissaoNotificacao();
        carregarTudo();
        setInterval(verificarVencimentosHoje, 60000); // Checa a cada minuto
    }

    function switchTab(tab) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    function adicionarManual() {
        const p = parseFloat(document.getElementById('inp-p').value) || 0;
        const i = parseFloat(document.getElementById('inp-i').value) || 0;
        const n = parseInt(document.getElementById('inp-n').value) || 1;
        if(p <= 0) return;

        dadosFinanceiros.unshift({
            id: Date.now(),
            valor: p,
            lucro: p * (i/100) * n,
            data: new Date().toLocaleDateString('pt-BR'),
            prazo: n,
            recebido: false,
            dataColeta: null
        });
        salvar();
        document.getElementById('inp-p').value = "";
    }

    function marcarRecebido(id) {
        const item = dadosFinanceiros.find(d => d.id === id);
        if(item && !item.recebido) {
            item.recebido = true;
            item.dataColeta = new Date().toLocaleString('pt-BR');
            saldoCofre += item.lucro;
            salvar();
            Swal.fire({ icon: 'success', title: 'Lucro coletado!', showConfirmButton: false, timer: 1000 });
        }
    }

    function zerarSaldoColetado() {
        Swal.fire({ title: 'Zerar Saldo?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Sim' }).then((r) => {
            if (r.isConfirmed) { saldoCofre = 0; salvar(); }
        });
    }

    function remover(id) {
        dadosFinanceiros = dadosFinanceiros.filter(d => d.id !== id);
        salvar();
    }

    function salvar() {
        localStorage.setItem(currentUser + '_dados', JSON.stringify(dadosFinanceiros));
        localStorage.setItem(currentUser + '_cofre', saldoCofre);
        renderFinanceiro();
        renderExtrato();
    }

    function carregarTudo() {
        dadosFinanceiros = JSON.parse(localStorage.getItem(currentUser + '_dados')) || [];
        saldoCofre = parseFloat(localStorage.getItem(currentUser + '_cofre')) || 0;
        renderFinanceiro();
        renderExtrato();
    }

    function renderFinanceiro() {
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        let pLucro = 0, pInv = 0;

        // Filtra apenas o que NÃO foi recebido para a aba principal
        const operacoesAtivas = dadosFinanceiros.filter(d => !d.recebido);

        document.getElementById('lista-financeiro').innerHTML = operacoesAtivas.map(item => {
            pLucro += item.lucro; pInv += item.valor;
            const previsao = formatarDataRecebimento(item.data, item.prazo || 1);
            return `
                <div class="hist-item">
                    <button class="btn-del" onclick="remover(${item.id})">&times;</button>
                    <small style="color:#ffaa00">● EM OPERAÇÃO</small><br>
                    <small>${item.data} (${item.prazo} dias)</small><br>
                    <b>Aporte: ${f(item.valor)}</b> | <b style="color:var(--neon)">+ ${f(item.lucro)}</b><br>
                    <div class="date-badge"><i class="far fa-calendar-check"></i> Receber em: ${previsao}</div>
                    <button class="btn-check" onclick="marcarRecebido(${item.id})">COLETAR LUCRO</button>
                </div>
            `;
        }).join('');

        // Se não houver nada ativo
        if(operacoesAtivas.length === 0) {
            document.getElementById('lista-financeiro').innerHTML = '<p style="text-align:center; color:#555; margin-top:20px;">Nenhuma operação ativa.</p>';
        }

        document.getElementById('label-carteira').innerText = f(saldoCofre);
        document.getElementById('label-lucro').innerText = f(pLucro);
        document.getElementById('label-inv').innerText = f(pInv);
    }

    // --- OPÇÃO 2: RENDERIZAR EXTRATO ---
    function renderExtrato() {
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const concluidos = dadosFinanceiros.filter(d => d.recebido);

        document.getElementById('lista-extrato').innerHTML = concluidos.map(item => `
            <div class="hist-item" style="border-left-color: var(--neon); opacity: 0.8;">
                <button class="btn-del" onclick="remover(${item.id})">&times;</button>
                <small style="color:var(--neon)">✓ COLETADO EM: ${item.dataColeta}</small><br>
                <b>Aporte Original: ${f(item.valor)}</b><br>
                <b style="color:var(--neon)">Lucro Líquido: + ${f(item.lucro)}</b>
            </div>
        `).join('');

        if(concluidos.length === 0) {
            document.getElementById('lista-extrato').innerHTML = '<p style="text-align:center; color:#555;">Nenhum lucro coletado ainda.</p>';
        }
    }

    // --- IA SCANNER (Resumido para o exemplo) ---
    async function processarIA(input) {
        if (!input.files[0]) return;
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        try {
            const worker = await Tesseract.createWorker();
            await worker.loadLanguage('por');
            await worker.initialize('por');
            const { data: { text } } = await worker.recognize(input.files[0]);
            // Simulação de extração de valores
            const valorDetectado = parseFloat(text.match(/\d+[\.,]\d{2}/)) || 0;
            if(valorDetectado > 0) {
                dadosEscaneados.push({ id: Date.now(), investido: valorDetectado, lucro: valorDetectado * 0.1, prazo: 1, data: new Date().toLocaleDateString('pt-BR'), previsao: 'Amanhã' });
            }
            await worker.terminate();
            renderScanner();
        } catch (e) { Swal.fire("Erro", "Erro na IA", "error"); }
        loading.style.display = 'none';
    }

    function renderScanner() {
        document.getElementById('btn-lancar-ia').style.display = dadosEscaneados.length > 0 ? 'block' : 'none';
        document.getElementById('lista-ia').innerHTML = dadosEscaneados.map(item => `<div class="card"><b>R$ ${item.investido}</b> (IA detectou)</div>`).join('');
    }

    function lancarEscaneados() {
        dadosEscaneados.forEach(item => {
            dadosFinanceiros.unshift({ id: item.id, valor: item.investido, lucro: item.lucro, data: item.data, prazo: item.prazo, recebido: false });
        });
        dadosEscaneados = [];
        salvar();
        switchTab('financeiro');
    }

    window.onload = () => {
        const s = localStorage.getItem('finance_session');
        if(s) { document.getElementById('userField').value = s; handleLogin(); }
    };
</script>
</body>
</html>
