    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO ™ Hub</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; 
            --red: #ff3e3e; --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }
        
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; font-size: 16px; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--neon); color: #000; font-weight: bold; cursor: pointer; }

        header {
            padding: 15px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .nav-tabs { display: flex; gap: 10px; margin-top: 15px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #111; color: #888; font-weight: bold; cursor: pointer; font-size: 11px; }
        .tab-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,136,0.05); }

        .container { padding: 15px; max-width: 500px; margin: auto; width: 100%; }
        .view { display: none; }
        .view.active { display: block; }

        .wallet-card { background: linear-gradient(135deg, #111 0%, #050505 100%); padding: 20px; border-radius: 15px; border: 1px solid var(--neon); text-align: center; margin-bottom: 15px; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; font-weight: bold; }
        
        .btn-zerar {
            background: rgba(255, 62, 62, 0.1); color: var(--red); border: 1px solid var(--red);
            padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: bold;
            margin-top: 10px; cursor: pointer;
        }

        .btn-notif { background: none; border: 1px solid #333; color: #888; padding: 5px 10px; border-radius: 20px; font-size: 10px; margin-top: 10px; cursor: pointer; }
        .btn-notif.active { border-color: var(--blue); color: var(--blue); }

        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .input-box { background: #1a1a1a; padding: 10px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; display: flex; align-items: center; }
        .input-box label { display: block; font-size: 9px; color: #888; margin-bottom: 2px; flex: 1; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; outline: none; font-size: 14px; }
        .input-box i { color: var(--neon); margin-right: 10px; font-size: 14px; }

        .scanner-btn { background: #121212; border: 2px dashed #333; border-radius: 20px; padding: 30px 10px; text-align: center; cursor: pointer; margin-bottom: 15px; }
        .loading-box { display: none; margin-top: 15px; color: var(--blue); font-weight: bold; font-size: 0.8rem; }
        .btn-lancar { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-bottom: 15px; display: none; }

        .hist-item { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #333; position: relative; border-left: 5px solid #ffaa00; }
        .btn-del { position: absolute; right: 10px; top: 10px; color: var(--red); background: none; border: none; font-size: 20px; cursor: pointer; }
        .btn-check { width: 100%; margin-top: 10px; padding: 10px; border-radius: 8px; border: 1px solid var(--neon); background: transparent; color: var(--neon); font-weight: bold; cursor: pointer; }
        
        .date-badge { display: inline-block; background: rgba(0, 212, 255, 0.1); color: var(--blue); padding: 4px 8px; border-radius: 6px; font-size: 11px; margin-top: 8px; font-weight: bold; border: 1px solid rgba(0, 212, 255, 0.2); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--neon); margin-bottom: 20px;">Finance PRO</h1>
        <input type="text" id="userField" placeholder="Seu ID">
        <input type="password" id="passField" placeholder="Senha">
        <button class="btn-auth" onclick="handleLogin()">ENTRAR</button>
    </div>
</div>

<header id="main-header" style="display:none">
    <div class="wallet-card">
        <span class="stat-label" style="color: var(--neon)">Saldo Coletado</span>
        <div id="label-carteira" style="font-size: 24px; font-weight: 900; color: #fff; margin: 5px 0;">R$ 0,00</div>
        
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-zerar" onclick="zerarSaldoColetado()">ZERAR SALDO</button>
            <button class="btn-notif" id="btn-perm-notif" onclick="requestNotificationPermission()">
                <i class="fas fa-bell"></i> ATIVAR ALERTAS
            </button>
        </div>

        <div style="display:flex; gap:10px; justify-content:center; margin-top:15px">
            <div class="stat-label">Investido: <span id="label-inv" style="color:var(--blue)">R$ 0,00</span></div>
            <div class="stat-label">Pendente: <span id="label-lucro" style="color:#ffaa00">R$ 0,00</span></div>
        </div>
    </div>
    <div class="nav-tabs">
        <button class="tab-btn active" id="tab-f" onclick="switchTab('financeiro')"><i class="fas fa-wallet"></i> FINANCEIRO</button>
        <button class="tab-btn" id="tab-s" onclick="switchTab('scanner')"><i class="fas fa-robot"></i> ESCANEAR IA</button>
    </div>
</header>

<div class="container" id="app-content" style="display:none">
    <div id="view-financeiro" class="view active">
        <div class="card">
            <div class="input-box"><i class="fas fa-calendar-alt"></i><div style="flex:1"><label>DATA INICIAL</label><input type="date" id="inp-data"></div></div>
            <div class="input-box"><i class="fas fa-dollar-sign"></i><div style="flex:1"><label>VALOR (R$)</label><input type="number" id="inp-p" placeholder="0.00"></div></div>
            <div class="input-box"><i class="fas fa-percent"></i><div style="flex:1"><label>TAXA (%)</label><input type="number" id="inp-i" placeholder="0"></div></div>
            <div class="input-box"><i class="fas fa-clock"></i><div style="flex:1"><label>DIAS</label><input type="number" id="inp-n" value="1"></div></div>
            <button class="btn-save" onclick="adicionarManual()" style="width:100%; padding:15px; border-radius:12px; background:var(--neon); border:none; font-weight:bold; cursor:pointer;">LANÇAR MANUAL</button>
        </div>
        <div id="lista-financeiro"></div>
    </div>

    <div id="view-scanner" class="view">
        <div class="scanner-btn" onclick="document.getElementById('file-input').click()">
            <span style="font-size: 2rem;">📸</span><br>
            <b style="color: var(--blue);">ESCANEAR COMPROVANTE</b>
            <input type="file" id="file-input" accept="image/*" hidden onchange="processarIA(this)">
            <div id="loading" class="loading-box">🤖 IA ANALISANDO...</div>
        </div>
        <button id="btn-lancar-ia" class="btn-lancar" onclick="lancarEscaneados()">🚀 LANÇAR TUDO NO FINANCEIRO</button>
        <div id="lista-ia"></div>
    </div>
</div>

<script>
    let currentUser = "";
    let dadosFinanceiros = [];
    let dadosEscaneados = [];
    let saldoCofre = 0;

    function handleLogin() {
        const u = document.getElementById('userField').value.trim().toLowerCase();
        if(!u) {
            Swal.fire("Ops", "Digite seu ID", "warning");
            return;
        }
        currentUser = u;
        localStorage.setItem('finance_session', u);
        
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'block';
        document.getElementById('app-content').style.display = 'block';
        
        document.getElementById('inp-data').valueAsDate = new Date();
        
        updateNotifBtn();
        carregarTudo();
        setInterval(checkVencimentos, 60000);
    }

    function switchTab(t) { 
        // Esconde todas as views
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); 
        // Remove active de todos os botões
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
        
        // Mostra a view correta
        document.getElementById('view-' + t).classList.add('active'); 
        
        // Adiciona active no botão correto
        if(t === 'financeiro') document.getElementById('tab-f').classList.add('active');
        else document.getElementById('tab-s').classList.add('active');
    }

    async function processarIA(input) {
        if (!input.files || !input.files[0]) return;
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        
        try {
            const worker = await Tesseract.createWorker({
                logger: m => { if(m.status === 'recognizing') loading.innerText = `🤖 IA: ${Math.round(m.progress * 100)}%`; }
            });
            await worker.loadLanguage('por+eng');
            await worker.initialize('por+eng');
            
            const { data: { text } } = await worker.recognize(input.files[0]);
            
            const regexMoeda = /(?:BRL|R\$)\s?(\d+[\.,]\d{2})/gi;
            const todosValores = [...text.matchAll(regexMoeda)].map(m => parseFloat(m[1].replace(',', '.')));
            
            const dataGeral = (text.match(/(\d{2}\/\d{2}\/\d{4})/) || [])[0] || new Date().toLocaleDateString('pt-BR');
            const prazoGeral = parseInt((text.match(/(\d+)\s?dias/i) || [])[1]) || 1;

            dadosEscaneados = [];

            for (let i = 0; i < todosValores.length; i += 2) {
                const vInv = todosValores[i];
                const vLuc = todosValores[i + 1];

                if (vInv !== undefined && vLuc !== undefined) {
                    dadosEscaneados.push({
                        id: Date.now() + i + Math.random(), 
                        investido: vInv,
                        lucro: vLuc,
                        prazo: prazoGeral,
                        data: dataGeral,
                        previsao: formatarDataRecebimento(dataGeral, prazoGeral)
                    });
                }
            }

            await worker.terminate();
            renderScanner();
        } catch (e) { Swal.fire("Erro", "Falha na leitura.", "error"); }
        finally { loading.style.display = 'none'; input.value = ""; }
    }

    function renderScanner() {
        const btn = document.getElementById('btn-lancar-ia');
        btn.style.display = dadosEscaneados.length > 0 ? 'block' : 'none';
        document.getElementById('lista-ia').innerHTML = dadosEscaneados.map(item => `
            <div class="card" style="border-left:4px solid var(--blue); position:relative">
                <button onclick="removerPreLançamento(${item.id})" style="position:absolute; right:10px; top:10px; border:none; background:none; color:var(--red); font-size:24px;">&times;</button>
                <small>${item.data} (<b>${item.prazo} dias</b>)</small><br>
                <b>Inv: R$ ${item.investido.toFixed(2)}</b> | <b style="color:var(--neon)">Lucro: R$ ${item.lucro.toFixed(2)}</b>
                <div class="date-badge">Receber em: ${item.previsao}</div>
            </div>
        `).join('');
    }

    function removerPreLançamento(id) {
        dadosEscaneados = dadosEscaneados.filter(x => x.id !== id);
        renderScanner();
    }

    function lancarEscaneados() {
        dadosEscaneados.forEach(item => {
            dadosFinanceiros.unshift({ id: item.id, valor: item.investido, lucro: item.lucro, data: item.data, prazo: item.prazo, recebido: false, notificado: false });
        });
        dadosEscaneados = [];
        salvar();
        renderScanner();
        switchTab('financeiro');
        Swal.fire("Sucesso", "Itens lançados individualmente!", "success");
    }

    function formatarDataRecebimento(dataStr, dias) {
        try {
            let p = dataStr.split('/');
            let d = new Date(p[2], p[1]-1, p[0]);
            d.setDate(d.getDate() + parseInt(dias));
            const sem = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
            return `${sem[d.getDay()]}, ${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}`;
        } catch(e) { return "Data inválida"; }
    }

    function carregarTudo() {
        dadosFinanceiros = JSON.parse(localStorage.getItem(currentUser + '_dados')) || [];
        saldoCofre = parseFloat(localStorage.getItem(currentUser + '_cofre')) || 0;
        renderFinanceiro();
    }

    function salvar() {
        localStorage.setItem(currentUser + '_dados', JSON.stringify(dadosFinanceiros));
        localStorage.setItem(currentUser + '_cofre', saldoCofre);
        renderFinanceiro();
    }

    function renderFinanceiro() {
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        let pLucro = 0, pInv = 0;
        document.getElementById('lista-financeiro').innerHTML = dadosFinanceiros.map(item => {
            if(!item.recebido) { pLucro += item.lucro; pInv += item.valor; }
            return `
                <div class="hist-item" style="border-left-color: ${item.recebido ? 'var(--neon)' : '#ffaa00'}">
                    <button class="btn-del" onclick="remover(${item.id})">&times;</button>
                    <small>${item.data} (${item.prazo} dias)</small><br>
                    <b>${f(item.valor)}</b> | <b style="color:var(--neon)">+ ${f(item.lucro)}</b><br>
                    ${!item.recebido ? `
                        <div class="date-badge">Receber em: ${formatarDataRecebimento(item.data, item.prazo)}</div>
                        <button class="btn-check" onclick="marcarRecebido(${item.id})">COLETAR LUCRO</button>
                    ` : '<div class="date-badge" style="color:var(--neon); background:rgba(0,255,136,0.1)">CONCLUÍDO</div>'}
                </div>
            `;
        }).join('');
        document.getElementById('label-carteira').innerText = f(saldoCofre);
        document.getElementById('label-lucro').innerText = f(pLucro);
        document.getElementById('label-inv').innerText = f(pInv);
    }

    function adicionarManual() {
        const dataInput = document.getElementById('inp-data').value;
        const p = parseFloat(document.getElementById('inp-p').value) || 0;
        const i = parseFloat(document.getElementById('inp-i').value) || 0;
        const n = parseInt(document.getElementById('inp-n').value) || 1;
        if(p <= 0 || !dataInput) return;
        const [ano, mes, dia] = dataInput.split('-');
        const dataFormatada = `${dia}/${mes}/${ano}`;
        dadosFinanceiros.unshift({ id: Date.now() + Math.random(), valor: p, lucro: p*(i/100)*n, data: dataFormatada, prazo: n, recebido: false, notificado: false });
        salvar();
        document.getElementById('inp-p').value = "";
    }

    function marcarRecebido(id) {
        const it = dadosFinanceiros.find(d => d.id === id);
        if(it && !it.recebido) {
            it.recebido = true;
            saldoCofre += it.lucro;
            salvar();
        }
    }

    function remover(id) { 
        dadosFinanceiros = dadosFinanceiros.filter(d => d.id !== id); 
        salvar(); 
    }

    function zerarSaldoColetado() {
        Swal.fire({ title: 'Zerar?', icon: 'warning', showCancelButton: true }).then(r => { if(r.isConfirmed) { saldoCofre=0; salvar(); }});
    }

    function requestNotificationPermission() {
        Notification.requestPermission().then(p => { if (p === "granted") updateNotifBtn(); });
    }

    function updateNotifBtn() {
        const btn = document.getElementById('btn-perm-notif');
        if (Notification.permission === "granted") {
            btn.innerHTML = '<i class="fas fa-bell"></i> ALERTAS ATIVOS';
            btn.classList.add('active');
        }
    }

    function checkVencimentos() {
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        dadosFinanceiros.forEach(item => {
            if (!item.recebido && !item.notificado) {
                let p = item.data.split('/');
                let dv = new Date(p[2], p[1]-1, p[0]);
                dv.setDate(dv.getDate() + parseInt(item.prazo));
                if (hoje >= dv) {
                    if (Notification.permission === "granted") new Notification("💰 Lucro disponível!");
                    item.notificado = true;
                    salvar();
                }
            }
        });
    }

    window.onload = () => { 
        if(localStorage.getItem('finance_session')) { 
            document.getElementById('userField').value = localStorage.getItem('finance_session'); 
            handleLogin(); 
        } 
    };
</script>
</body>
</html>
