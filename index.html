<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINANCEIRO PRO | EXCLUSIVE ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- BACKGROUND EFFECTS --- */
        body::before {
            content: ''; position: fixed; top: -10%; left: -10%; width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.05) 0%, transparent 70%); z-index: -1;
        }

        /* --- HEADER LUXURY --- */
        .header {
            height: 100px; padding: 0 40px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .brand { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: 4px; font-size: 14px; color: var(--primary); }

        .stats-group { display: flex; gap: 25px; align-items: center; }

        .premium-card {
            background: var(--glass); border: 1px solid var(--border); padding: 12px 25px;
            border-radius: 16px; position: relative; min-width: 180px; transition: 0.4s;
        }
        .premium-card:hover { border-color: var(--primary); box-shadow: var(--accent-shadow); transform: translateY(-3px); }

        .premium-card .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-bottom: 4px; display: block; }
        .premium-card .value { font-size: 20px; font-weight: 800; font-family: 'Inter', sans-serif; }
        .val-lucro { color: var(--primary); }
        .val-inv { color: var(--secondary); }

        /* --- BOTÃO HIGH-END --- */
        .btn-premium {
            background: #fff; color: #000; border: none; padding: 14px 28px; border-radius: 12px;
            font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-premium:hover { background: var(--primary); transform: scale(1.05); }

        /* --- CONTEÚDO IA (SITE CAVALO) --- */
        .main-content { flex: 1; padding: 20px; display: flex; justify-content: center; }
        
        .iframe-container {
            width: 100%; max-width: 1400px; height: 100%; border-radius: 24px; overflow: hidden;
            border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.5); background: #000;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Toast Minimalista */
        #notify {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #fff; color: #000; padding: 12px 30px; border-radius: 50px;
            font-size: 12px; font-weight: 700; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #notify.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="notify">SISTEMA ATUALIZADO COM SUCESSO</div>

    <header class="header">
        <div class="brand">FINANCEIRO<span style="color:#fff">PRO</span></div>
        
        <div class="stats-group">
            <div class="premium-card">
                <span class="label">Net Profit</span>
                <span id="h-lucro" class="value val-lucro">R$ 0,00</span>
            </div>
            <div class="premium-card">
                <span class="label">IA Invested</span>
                <span id="h-inv" class="value val-inv">R$ 0,00</span>
            </div>
            <button class="btn-premium" onclick="updateSystem()">
                <i class="fas fa-bolt" style="margin-right: 8px;"></i> Sync Hub
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="iframe-container">
            <iframe id="ia-frame" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
        </div>
    </main>

    <script>
        function updateSystem() {
            const frame = document.getElementById('ia-frame').contentWindow;
            // Pede para o Cavalo somar os registros pretos
            frame.postMessage({ type: 'requestFullHistory' }, '*');
        }

        window.addEventListener('message', (e) => {
            if (e.data.type === 'sync_history' || e.data.type === 'lancar') {
                const l = e.data.lucroTotal || 0;
                const i = e.data.invTotal || 0;

                // Atualiza o topo elegante
                document.getElementById('h-lucro').innerText = l.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
                document.getElementById('h-inv').innerText = i.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

                localStorage.setItem('hub_l', l);
                localStorage.setItem('hub_i', i);

                // Feedback visual caro
                const n = document.getElementById('notify');
                n.classList.add('active');
                setTimeout(() => n.classList.remove('active'), 3000);
            }
        });

        window.onload = () => {
            const l = parseFloat(localStorage.getItem('hub_l') || 0);
            const i = parseFloat(localStorage.getItem('hub_i') || 0);
            document.getElementById('h-lucro').innerText = l.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('h-inv').innerText = i.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        };
    </script>
</body>
</html>
