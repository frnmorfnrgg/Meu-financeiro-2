<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINANCE PRO - AUTO SYNC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --p: #00ff88; --s: #00d4ff; --bg: #050505; --glass: rgba(255,255,255,0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER PREMIUM UNIFICADO */
        header {
            height: 85px; padding: 0 25px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(10,10,10,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .stats { display: flex; gap: 15px; }
        .stat-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 12px; min-width: 160px; }
        .label { font-size: 8px; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .value { font-size: 18px; font-weight: 800; display: block; }
        .p-color { color: var(--p); }

        /* NAVEGAÇÃO POR ABAS */
        .tabs { background: #111; padding: 4px; border-radius: 10px; display: flex; gap: 4px; border: 1px solid #222; }
        .tab-btn { padding: 8px 16px; border: none; background: transparent; color: #555; font-size: 10px; font-weight: 700; cursor: pointer; border-radius: 6px; text-transform: uppercase; }
        .tab-btn.active { background: var(--p); color: #000; }

        /* CONTEÚDO */
        main { flex: 1; padding: 15px; position: relative; }
        .page { width: 100%; height: 100%; border-radius: 16px; overflow: hidden; display: none; border: 1px solid #222; }
        .page.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        /* LOADING NOTIFY */
        #sync-box {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--p); color: #000; padding: 10px 25px; border-radius: 30px;
            font-size: 11px; font-weight: 800; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="sync-box">🔄 SINCRONIZANDO SALDOS DA IA...</div>

    <header>
        <div class="stats">
            <div class="stat-card">
                <span class="label">Saldo Histórico IA</span>
                <span id="saldo-ia" class="value p-color">R$ 0,00</span>
            </div>
            <div class="stat-card">
                <span id="label-dinamico" class="label">Investimento Total</span>
                <span id="saldo-inv" class="value" style="color:var(--s)">R$ 0,00</span>
            </div>
        </div>

        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('ia', this)">Scanner Cavalo</button>
            <button class="tab-btn" onclick="switchTab('fin', this)">Financeiro</button>
        </nav>

        <button onclick="requestHistory()" style="background:#fff; color:#000; border:none; padding:10px 15px; border-radius:8px; font-size:10px; font-weight:800; cursor:pointer;">
            <i class="fas fa-sync"></i> CARREGAR HISTÓRICO
        </button>
    </header>

    <main>
        <div id="page-ia" class="page active">
            <iframe id="iframe-ia" src="https://frnmorfnrgg.github.io/Cavalo/"></iframe>
        </div>
        <div id="page-fin" class="page">
            <iframe id="iframe-fin" src="https://frnmorfnrgg.github.io/Meu-financeiro-4/"></iframe>
        </div>
    </main>

    <script>
        function switchTab(t, b) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('page-' + t).classList.add('active');
            b.classList.add('active');
        }

        // 1. Pede os dados para o site do Cavalo
        function requestHistory() {
            document.getElementById('sync-box').style.display = 'block';
            const frameIA = document.getElementById('iframe-ia').contentWindow;
            frameIA.postMessage({ type: 'requestFullHistory' }, '*');
        }

        // 2. Recebe a soma dos lucros e investimentos
        window.addEventListener('message', (e) => {
            if (e.data.type === 'sync_history' || e.data.type === 'lancar') {
                const totalLucro = e.data.lucroTotal || 0;
                const totalInv = e.data.invTotal || 0;

                // Formatação Brasileira
                const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                // 3. Carrega nos saldos do site (Topo)
                document.getElementById('saldo-ia').innerText = f(totalLucro);
                document.getElementById('saldo-inv').innerText = f(totalInv);

                // Salva no navegador
                localStorage.setItem('cached_lucro', totalLucro);
                localStorage.setItem('cached_inv', totalInv);

                // 4. Injeta o saldo dentro do Financeiro também
                document.getElementById('iframe-fin').contentWindow.postMessage({
                    type: 'forceUpdateFinance',
                    lucro: totalLucro,
                    investido: totalInv
                }, '*');

                setTimeout(() => { document.getElementById('sync-box').style.display = 'none'; }, 1000);
            }
        });

        // Carregar ao abrir
        window.onload = () => {
            const l = parseFloat(localStorage.getItem('cached_lucro') || 0);
            const i = parseFloat(localStorage.getItem('cached_inv') || 0);
            const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('saldo-ia').innerText = f(l);
            document.getElementById('saldo-inv').innerText = f(i);
        };
    </script>
</body>
</html>
