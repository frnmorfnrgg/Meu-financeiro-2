<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financeiro PRO - HUB v6.0</title>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* --- CABEÇALHO FIXO ÚNICO --- */
        .header {
            height: 85px; background: #111; display: flex; align-items: center;
            padding: 0 20px; border-bottom: 2px solid var(--primary); justify-content: space-between;
            flex-shrink: 0;
        }
        .stats-container { display: flex; gap: 12px; flex-grow: 1; margin-right: 15px; }
        .stat-card { 
            background: var(--card-bg); padding: 10px 15px; border-radius: 12px; 
            border: 1px solid #333; flex: 1; display: flex; flex-direction: column;
        }
        .stat-label { font-size: 9px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 16px; font-weight: 800; }
        .val-lucro { color: var(--primary); }
        .val-inv { color: #ffc107; }

        .btn-lancar {
            background: var(--secondary); color: #000; border: none;
            padding: 12px 18px; border-radius: 10px; font-weight: 900; font-size: 11px;
            cursor: pointer; text-transform: uppercase;
        }

        /* --- ÁREA DO CONTEÚDO --- */
        .main-view { flex-grow: 1; position: relative; width: 100%; }
        iframe { width: 100%; height: 100%; border: none; }

        /* MENSAGEM BONITA */
        #msg-sucesso {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #000; padding: 10px 20px;
            border-radius: 30px; font-weight: bold; font-size: 14px;
            display: none; z-index: 9999; box-shadow: 0 5px 15px rgba(0,255,136,0.4);
        }
    </style>
</head>
<body>

    <div id="msg-sucesso">🌟 Saldo atualizado com sucesso!</div>

    <header class="header">
        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-label">Lucro Total</span>
                <span id="topo-lucro" class="stat-val val-lucro">R$ 0,00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Investido IA</span>
                <span id="topo-inv" class="stat-val val-inv">R$ 0,00</span>
            </div>
        </div>
        
        <button class="btn-lancar" onclick="sincronizarAutomatico()">🚀 Lançar Saldo</button>
    </header>

    <main class="main-view">
        <iframe id="iframe-ia" src="https://frnmorfnrgg.github.io/Meu-financeiro-2/"></iframe>
    </main>

    <script>
        function sincronizarAutomatico() {
            const frame = document.getElementById('iframe-ia').contentWindow;
            // Solicita a soma dos registros para a aba IA
            frame.postMessage({ type: 'requestFullHistory' }, '*');
        }

        window.addEventListener('message', (e) => {
            if (e.data.type === 'sync_history' || e.data.type === 'lancar') {
                const lucroTotal = e.data.lucroTotal || 0;
                const invTotal = e.data.invTotal || 0;

                // 1. Atualiza o topo do Hub
                document.getElementById('topo-lucro').innerText = lucroTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                document.getElementById('topo-inv').innerText = invTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                // 2. Salva para não perder ao atualizar a página
                localStorage.setItem('hub_lucro', lucroTotal);
                localStorage.setItem('hub_inv', invTotal);

                // 3. Envia o saldo para DENTRO da aba de investimento (Iframe)
                document.getElementById('iframe-ia').contentWindow.postMessage({
                    type: 'forceUpdateFinance',
                    lucro: lucroTotal,
                    investido: invTotal
                }, '*');

                // Exibe mensagem bonita
                const msg = document.getElementById('msg-sucesso');
                msg.style.display = 'block';
                setTimeout(() => { msg.style.display = 'none'; }, 3000);
            }
        });

        // Carrega os dados ao abrir o site
        window.onload = () => {
            const l = parseFloat(localStorage.getItem('hub_lucro') || 0);
            const i = parseFloat(localStorage.getItem('hub_inv') || 0);
            document.getElementById('topo-lucro').innerText = l.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('topo-inv').innerText = i.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };
    </script>
</body>
</html>
